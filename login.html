<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ចន្ទមាលា — ចូលប្រព័ន្ធ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Moul&family=Battambang:wght@300;400;700&family=Noto+Serif+Khmer:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:        #e8b4b8;
    --rose-deep:   #c97d84;
    --blush:       #f5e6e8;
    --cream:       #fdf8f4;
    --gold:        #c9a96e;
    --gold-light:  #e8d5b0;
    --brown-soft:  #8b6f5e;
    --maroon:      #7a3e48;
    --lotus:       #d4a0a7;
    --sage:        #a8b5a0;
    --ink:         #3a2a2e;
    --ink-light:   #6b4f56;
    --shadow:      rgba(122,62,72,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Battambang', serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(232,180,184,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,169,110,0.12) 0%, transparent 60%);
  }

  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 1.5rem;
    animation: fadeDown 0.7s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ornament {
    text-align: center;
    font-size: 1.4rem;
    color: var(--rose-deep);
    letter-spacing: 0.4em;
    margin-bottom: 0.6rem;
    opacity: 0.7;
  }

  .site-title {
    font-family: 'Moul', serif;
    font-size: 1.7rem;
    color: var(--maroon);
    text-align: center;
    line-height: 1.6;
    margin-bottom: 0.25rem;
  }

  .site-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    color: var(--brown-soft);
    text-align: center;
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
    font-style: italic;
  }

  .card {
    background: #fff;
    border: 1px solid var(--gold-light);
    border-radius: 16px;
    padding: 2.2rem 2rem 2rem;
    box-shadow: 0 4px 28px var(--shadow), 0 1px 4px rgba(201,169,110,0.08);
  }

  .card-heading {
    font-family: 'Noto Serif Khmer', serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--ink-light);
    text-align: center;
    margin-bottom: 0.35rem;
    line-height: 1.9;
  }

  .card-hint {
    font-size: 0.82rem;
    color: var(--lotus);
    text-align: center;
    margin-bottom: 1.6rem;
    line-height: 1.9;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    margin-bottom: 1.4rem;
  }
  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-light), transparent);
  }
  .divider-icon {
    color: var(--gold);
    font-size: 0.9rem;
    opacity: 0.8;
  }

  label {
    display: block;
    font-size: 0.83rem;
    color: var(--ink-light);
    margin-bottom: 0.45rem;
    line-height: 1.9;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 1.2rem;
  }

  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 0.75rem 2.8rem 0.75rem 1rem;
    border: 1.5px solid var(--gold-light);
    border-radius: 9px;
    font-family: 'Battambang', serif;
    font-size: 0.95rem;
    color: var(--ink);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="password"]:focus,
  input[type="text"]:focus {
    border-color: var(--rose-deep);
    box-shadow: 0 0 0 3px rgba(232,180,184,0.22);
  }

  .toggle-pw {
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--brown-soft);
    font-size: 1rem;
    padding: 0.2rem;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .toggle-pw:hover { opacity: 1; }

  .btn {
    width: 100%;
    padding: 0.8rem;
    background: linear-gradient(135deg, var(--maroon) 0%, var(--rose-deep) 100%);
    color: #fff;
    border: none;
    border-radius: 9px;
    font-family: 'Battambang', serif;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.2s, transform 0.15s;
    line-height: 2;
  }
  .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: 0.55; cursor: default; }

  .error-msg {
    display: none;
    margin-top: 0.85rem;
    padding: 0.65rem 1rem;
    background: rgba(201,125,132,0.1);
    border: 1px solid rgba(201,125,132,0.3);
    border-radius: 7px;
    color: var(--maroon);
    font-size: 0.85rem;
    text-align: center;
    line-height: 1.9;
  }
  .error-msg.show { display: block; }

  .footer-note {
    text-align: center;
    margin-top: 1.8rem;
    font-size: 0.75rem;
    color: var(--lotus);
    opacity: 0.7;
    line-height: 1.9;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="ornament">❧ ✦ ❧</div>
  <h1 class="site-title">ចន្ទមាលា</h1>
  <p class="site-sub">Chandamala · Birth Chart Astrology</p>

  <div class="card">
    <p class="card-heading">ទំព័រនេះត្រូវបានការពារ</p>
    <p class="card-hint">សូមបញ្ចូលពាក្យសម្ងាត់ដើម្បីចូលមើល</p>

    <div class="divider"><span class="divider-icon">✦</span></div>

    <label for="pw">ពាក្យសម្ងាត់</label>
    <div class="input-wrap">
      <input type="password" id="pw" autocomplete="current-password" placeholder="••••••••" />
      <button class="toggle-pw" type="button" onclick="togglePw()" title="បង្ហាញ/លាក់">👁</button>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">ចូលប្រព័ន្ធ</button>

    <div class="error-msg" id="errMsg">ពាក្យសម្ងាត់មិនត្រឹមត្រូវ។ សូមព្យាយាមម្ដងទៀត។</div>
  </div>

  <p class="footer-note">ចន្ទមាលា · ហោរាសាស្ត្រផែនទីកំណើត</p>
</div>

<script>
  /*
   * PASSWORD SETUP
   * --------------
   * The password is stored as a SHA-256 hash so it is not visible in plain text.
   *
   * To set your password:
   * 1. Open any browser console (F12 → Console).
   * 2. Run:
   *      hashPassword('your_new_password')
   * 3. Copy the printed hash and replace CORRECT_HASH below.
   *
   * Default password: chantmealea2026
   */
  const CORRECT_HASH = "032a1a0fc53e806a628f88b596da764e64e1b2eb9461b82743006b3dc7482b2b";
  // ^ SHA-256 of "chantmealea2026". Replace with hashPassword('your_password') output to change.

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, '0')).join('');
  }

  // Helper: run hashPassword('yourpassword') in console to get the hash
  window.hashPassword = async function(pw) {
    const h = await sha256(pw);
    console.log('Hash for "' + pw + '":\n' + h);
    return h;
  };

  async function doLogin() {
    const pw = document.getElementById('pw').value;
    if (!pw) return;

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '...';

    const hash = await sha256(pw);

    if (hash === CORRECT_HASH) {
      sessionStorage.setItem('chandamala_auth', '1');
      window.location.replace('index.html');
    } else {
      document.getElementById('errMsg').classList.add('show');
      btn.disabled = false;
      btn.textContent = 'ចូលប្រព័ន្ធ';
    }
  }

  function togglePw() {
    const el = document.getElementById('pw');
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  document.getElementById('pw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
    document.getElementById('errMsg').classList.remove('show');
  });
</script>
</body>
</html>
